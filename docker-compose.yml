services:
  postgres:
    image: postgres:16-alpine
    container_name: transportabr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: transportabr
      POSTGRES_PASSWORD: transportabr
      POSTGRES_DB: transportabr
    ports:
      - "5432:5432"
    volumes:
      - transportabr_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transportabr -d transportabr"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  transportabr_pgdata:
